<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Контакты | Luxury Hotel</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">

<style>
.map-wrapper {
  width: min(1000px, 92%);
  margin: 30px auto;
  border-radius: 14px;
  overflow: hidden;
  border: 1px solid #e6e6e6;
}

.map-wrapper iframe {
  width: 100%;
  height: 400px;
  border: 0;
}
</style>

</head>

<body>

<header>
  <div class="logo">Luxury Hotel</div>

  <nav>
     <a href="index.html">Главная</a>
     <a href="rooms.html">Номера</a>
     <a href="services.html">Услуги</a>
     <a href="contacts.html">Контакты</a>
  </nav>
</header>

<section class="page-herocont">
  <div class="hero-content">
    <h1>Контакты</h1>
    <p>Свяжитесь с нами удобным способом</p>
  </div>
</section>

<section class="section">
  <h2>Наши контакты</h2>

  <div class="contacts-grid">

    <div class="contact-card">
      <img src="https://images.pexels.com/photos/374074/pexels-photo-374074.jpeg">
      <h3>Адрес</h3>
      <p>Дубай, г. Дейра <br>ул. Мастерская 69</p>
    </div>

    <div class="contact-card">
      <img src="https://images.pexels.com/photos/5052875/pexels-photo-5052875.jpeg">
      <h3>Телефоны</h3>
      <p>+7 (771) 388-99-13</p>
      <p>+7 (705) 615-82-90</p>
    </div>

    <div class="contact-card">
      <img src="https://images.pexels.com/photos/1181676/pexels-photo-1181676.jpeg">
      <h3>Email</h3>
      <p>info@luxuryhotel.kz</p>
    </div>

  </div>
</section>

<!-- КАРТА -->
<section class="section">
  <h2>Мы на карте</h2>

  <div class="map-wrapper">
    <iframe 
      src="https://yandex.ru/map-widget/v1/?ll=55.304,25.269&z=12&text=Dubai%20Deira"
      allowfullscreen>
    </iframe>
  </div>
</section>

<section class="section">
  <h2>Напишите нам</h2>

  <form class="contact-form">
    <input type="text" placeholder="Ваше имя">
    <input type="email" placeholder="Ваш Email">
    <textarea placeholder="Сообщение"></textarea>
    <button type="submit">Отправить</button>
  </form>

</section>

<footer>
  © 2026 Luxury Hotel
</footer>

</body>
</html>
